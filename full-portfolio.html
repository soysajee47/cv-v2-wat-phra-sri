<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แฟ้มสะสมผลงานฉบับเต็ม | นางสาวสร้อยศจี จันทวงค์</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #818cf8;
            --secondary: #c084fc;
            --bg: #03030d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Twinkling Star Canvas Background */
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .ambient-glow {
            position: fixed;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.1) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            filter: blur(80px);
        }

        .glow-1 {
            top: 10%;
            left: -10%;
        }

        .glow-2 {
            bottom: 10%;
            right: -10%;
            background: radial-gradient(circle, rgba(192, 132, 252, 0.08) 0%, transparent 70%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 5rem 2rem;
        }

        /* Header Navigation & Branding */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-main);
        }

        .logo-area span {
            font-size: 1.5rem;
        }

        .logo-area div {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.2);
            transform: translateX(-3px);
        }

        /* Headline Section */
        .intro {
            text-align: center;
            margin-bottom: 4rem;
        }

        .intro h1 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff, #a5b4fc, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .intro p {
            color: var(--text-sub);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .portfolio-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            aspect-ratio: 1 / 1.414;
            /* A4 Ratio */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .portfolio-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .portfolio-card:hover {
            transform: translateY(-8px);
            border-color: rgba(129, 140, 248, 0.3);
            box-shadow: 0 15px 40px rgba(129, 140, 248, 0.15);
        }

        .portfolio-card:hover img {
            transform: scale(1.05);
        }

        /* Card overlay on hover */
        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(3, 3, 13, 0.9) 0%, rgba(3, 3, 13, 0) 50%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .portfolio-card:hover .card-overlay {
            opacity: 1;
        }

        .overlay-text {
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        /* Lightbox modal styles */
        .lightbox-modal {
            position: fixed;
            inset: 0;
            background-color: rgba(3, 3, 13, 0.95);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 2.2rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .close-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }

        /* Lightbox arrows navigation */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: #ffffff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(129, 140, 248, 0.3);
        }

        .prev-btn {
            left: 2%;
        }

        .next-btn {
            right: 2%;
        }

        .page-indicator {
            margin-top: 1rem;
            color: var(--text-sub);
            font-size: 0.95rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .nav-btn {
                background: rgba(3, 3, 13, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.1);
                width: 44px;
                height: 44px;
            }

            .prev-btn {
                left: 2%;
            }

            .next-btn {
                right: 2%;
            }

            .close-btn {
                top: 10px;
                right: 15px;
                background: rgba(255, 255, 255, 0.1);
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.8rem;
                backdrop-filter: blur(10px);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 3rem 1.5rem;
            }

            header {
                flex-direction: column;
                gap: 1.5rem;
                align-items: flex-start;
            }

            .btn-back {
                align-self: flex-end;
            }

            .intro h1 {
                font-size: 1.8rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>

<body>
    <!-- Ambient Background Elements -->
    <canvas id="star-canvas"></canvas>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="container">
        <!-- Navigation bar -->
        <header>
            <a href="portfolio.html" class="logo-area">
                <span>🌕</span>
                <div>PORTFOLIO</div>
            </a>
            <a href="portfolio.html" class="btn-back">
                <span>🎰</span> ย้อนกลับหน้าหลัก
            </a>
        </header>

        <!-- Main Banner -->
        <div class="intro">
            <h1>แฟ้มสะสมผลงาน (Full Portfolio)</h1>
            <p>รวมรายงานโครงการ กิจกรรม และผลงานทางวิชาการและการปฏิบัติงานด้านปัญญาประดิษฐ์ (AI) วิศวกรรมคอมพิวเตอร์</p>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="gallery-container">
            <!-- Cards will be populated dynamically -->
        </div>
    </div>

    <!-- Lightbox modal overlay -->
    <div class="lightbox-modal" id="lightbox">
        <button class="nav-btn prev-btn" id="prev-btn">❮</button>
        <div class="lightbox-content">
            <button class="close-btn" id="close-btn">&times;</button>
            <img src="" alt="Full Resolution" class="lightbox-img" id="lightbox-img">
            <div class="page-indicator" id="page-indicator">1 / 10</div>
        </div>
        <button class="nav-btn next-btn" id="next-btn">❯</button>
    </div>

    <script>
        // --- Star particles background animation ---
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');

        let stars = [];
        const maxStars = 80;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random() * 0.7 + 0.3;
                this.trend = Math.random() > 0.5 ? 0.005 : -0.005;
                this.velocity = Math.random() * 0.05 + 0.01;
            }
            update() {
                this.alpha += this.trend;
                if (this.alpha > 1 || this.alpha < 0.2) {
                    this.trend = -this.trend;
                }
                this.y -= this.velocity;
                if (this.y < 0) {
                    this.reset();
                    this.y = canvas.height;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < maxStars; i++) {
                stars.push(new Star());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animate();

        // --- Gallery Populate and Lightbox Script ---
        const totalImages = 12;
        const galleryContainer = document.getElementById('gallery-container');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageIndicator = document.getElementById('page-indicator');

        let currentIndex = 0;

        // Generate Cards
        for (let i = 1; i <= totalImages; i++) {
            const card = document.createElement('div');
            card.className = 'portfolio-card';
            card.innerHTML = `
                <img src="port-images/port${i}.jpg" alt="แฟ้มสะสมผลงาน หน้าที่ ${i}" loading="lazy">
                <div class="card-overlay">
                    <div class="overlay-text">
                        <span>🔍</span> เปิดอ่านหน้า ${i}
                    </div>
                </div>
            `;
            card.addEventListener('click', () => openLightbox(i - 1));
            galleryContainer.appendChild(card);
        }

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            document.body.style.overflow = '';
        }

        function updateLightbox() {
            lightboxImg.src = `port-images/port${currentIndex + 1}.jpg`;
            pageIndicator.textContent = `${currentIndex + 1} / ${totalImages}`;
        }

        // Event Listeners
        closeBtn.addEventListener('click', closeLightbox);
        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            nextImage();
        });
        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            prevImage();
        });

        // Clicks modal background to close
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Key bindings
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowRight') nextImage();
                if (e.key === 'ArrowLeft') prevImage();
                if (e.key === 'Escape') closeLightbox();
            }
        });
    </script>
</body>

</html>
